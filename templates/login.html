<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #1d4ed8; }
        .erro { color: red; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔒 Acesso Restrito</h2>
        <p style="color:#666; margin-bottom:20px;">Digite a senha para acessar o sistema.</p>
        
        {% if erro %}
        <p style="color:red; font-weight:bold;">Senha incorreta!</p>
        {% endif %}

        <form action="/autenticar" method="POST">
            <input type="password" name="senha" placeholder="Sua Senha" required autofocus>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
